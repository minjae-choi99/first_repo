<main class="page-main">
<section class="py-24 px-6 bg-healing-light/20 relative border-t border-healing-sand" id="guestbook">
<div class="max-w-4xl mx-auto">
<div class="text-center mb-12">
<span class="text-2xl">💌</span>
<h2 class="text-3xl md:text-4xl font-bold text-healing-wood mt-3 mb-4 font-editorial">홍시에게 남기는 따뜻한 편지</h2>
<p class="text-base text-healing-wood/75 font-light">가족과 랜선 지인분들의 고요하고 향긋한 안부 인사를 기다립니다</p>
<div class="w-12 h-0.5 bg-healing-forest/40 mx-auto mt-4 rounded-full"></div>
</div>
<!-- 편지지 작성 폼 -->
<div class="bg-white border border-healing-sand rounded-xl p-6 md:p-8 organic-shadow mb-12 max-w-2xl mx-auto">
<form class="space-y-4" id="comment-form" onsubmit="addComment(event)">
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<div>
<label class="block text-sm font-medium text-healing-wood mb-2 font-editorial" for="nickname">필명 (이름)</label>
<input class="w-full p-3 rounded-lg border border-healing-sand bg-healing-bg/50 focus:outline-none focus:border-healing-forest text-sm" id="nickname" placeholder="예: 평온한 가을날" required="" type="text"/>
</div>
<div>
<label class="block text-sm font-medium text-healing-wood mb-2 font-editorial" for="gift-snack">마음에 담은 차 한 잔</label>
<select class="w-full p-3 rounded-lg border border-healing-sand bg-white focus:outline-none focus:border-healing-forest text-sm text-healing-wood/80" id="gift-snack">
<option value="🍵 보드라운 녹차">🍵 보드라운 녹차</option>
<option value="🌾 구수한 보리차">🌾 구수한 보리차</option>
<option value="🌼 향긋한 캐모마일">🌼 향긋한 캐모마일</option>
<option value="🍊 달콤 쌉싸름한 귤피차">🍊 달콤 쌉싸름한 귤피차</option>
</select>
</div>
</div>
<div>
<label class="block text-sm font-medium text-healing-wood mb-2 font-editorial" for="comment">따스한 말 한마디</label>
<textarea class="w-full p-3 rounded-lg border border-healing-sand bg-healing-bg/50 focus:outline-none focus:border-healing-forest text-sm leading-relaxed" id="comment" placeholder="홍시야, 앞으로도 아프지 말고 너만의 느릿하고 포근한 시간 속에서 오래오래 행복하렴." required="" rows="3"></textarea>
</div>
<button class="w-full py-3 bg-healing-forest hover:bg-healing-deep text-white text-sm font-medium rounded-lg transition-all" type="submit">
                        💌 고요히 우편함에 편지 넣기
                    </button>
</form>
</div>
<!-- 안부 편지 가로 정렬 그리드 (JS로 렌더링됨) -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-6 max-w-3xl mx-auto" id="comments-container">
<!-- 동적 댓글들이 이 곳에 삽입됩니다 -->
</div>
</div>
</section>
</main>
